name: Deploy to GitHub Pages

# Builds the workspace (apps/web + admin + Penny demo, assembled by
# scripts/build-all.ts) and deploys dist/ to GitHub Pages.
#
# Activation: GitHub → Settings → Pages → "Source: GitHub Actions".
# Until that switch is flipped, this workflow runs builds but the legacy
# Jekyll/branch deploy keeps serving founderfirst.one. Stage B in PHASE-4.md.

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Fired by content-publish (Supabase edge fn) so a newly-published post/episode
  # rebuilds the static site without a code push. Needs a GH token on the fn side.
  repository_dispatch:
    types: [content-published]

# Pages deploys are mutually exclusive — let the latest in-flight run win.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

# Opt into Node.js 24 for all JS-based actions ahead of the June 2026
# forced default. Validates compatibility now; can flip back via
# ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION if anything regresses.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from package.json `packageManager` field.
      # Don't also pass `version:` here — action-setup@v4 errors on both.
      - uses: pnpm/action-setup@v4

      # Node version for the build itself (separate from the action runtimes
      # above). Bump in lockstep with engines requirements as needed.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Guard: fail fast if any @import'ed CSS partial is missing or 0 bytes
      # (the PR #66 regression — emptied partials are silently skipped by the
      # bundler and ship unstyled UI). `pnpm build` runs this too; the explicit
      # step gives a clear, isolated failure signal.
      - name: Check CSS imports
        run: pnpm check:css

      # Guard: every query against the tenant-partitioned ai_decisions table must
      # carry tenant_id (plan D15). Service-role bypasses RLS, so a missing
      # predicate is a silent cross-tenant leak. `pnpm build` runs this too.
      - name: Check tenant predicate
        run: pnpm check:tenant

      # Guard: prove resolve() (the AI quality & cost layer) builds the same
      # provider request each live call site built before the seam — answers
      # unchanged. Pure + deterministic; no network.
      - name: Check inference parity
        run: pnpm check:inference

      # Guard: the Phase-2 judge — deterministic gates, generator-family-aware panel
      # composition (judge ≠ generator, D20), fail-closed on judge error (D3), and
      # classifier triage. Pure + mocked transports; no network.
      - name: Check judge
        run: pnpm check:judge

      # Guard: the Supabase Edge copy of @ff/inference (vendored under _shared)
      # must match packages/inference/src — fails if core.ts was edited without
      # re-running `pnpm vendor:inference`.
      - name: Check vendored inference
        run: pnpm check:vendor

      - name: Build (web + admin + demo, assembled by build-all.ts)
        env:
          # Build-time env. Configure in repo Settings → Secrets and variables.
          # Values fall back to empty strings; the apps degrade to preview mode.
          VITE_SUPABASE_URL:      ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_POSTHOG_KEY:       ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST:      ${{ vars.VITE_POSTHOG_HOST }}
          VITE_GA_ID:             ${{ vars.VITE_GA_ID }}
          VITE_ADMIN_EMAIL:       ${{ vars.VITE_ADMIN_EMAIL }}
          # apps/web (Astro) reads PUBLIC_* — same values, Astro's client prefix.
          PUBLIC_SUPABASE_URL:      ${{ vars.VITE_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          PUBLIC_POSTHOG_KEY:       ${{ secrets.VITE_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST:      ${{ vars.VITE_POSTHOG_HOST }}
          PUBLIC_GA_ID:             ${{ vars.VITE_GA_ID }}
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # penny.founderfirst.one — the root-hosted (base "/") build of apps/app on the
  # Cloudflare Pages project "penny". founderfirst.one/app/ ships the same code at
  # base "/app/" via the build above; App.tsx follows BASE_URL so one codebase
  # serves both. Kept here (not a standalone workflow) so it rides this known-good
  # pipeline and stays in lockstep with main on every push.
  deploy-penny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build apps/app (base=/)
        env:
          VITE_SUPABASE_URL:      ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: pnpm -C apps/app exec vite build --base=/
      - name: SPA redirects
        run: printf '/* /index.html 200\n' > apps/app/dist/_redirects
      - name: Deploy to Cloudflare Pages (project penny)
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "430f00d6622c766342f89a4e6a2261f6"
        run: pnpm dlx wrangler@4 pages deploy apps/app/dist --project-name=penny --branch=main
