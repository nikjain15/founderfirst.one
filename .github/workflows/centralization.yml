name: Centralization gate

# Card CENTRAL-1 — the standing centralization gate. Fails the build if a
# component in apps/app reintroduces a hard-coded user-facing string literal
# (they must live in apps/app/src/copy/strings.ts, COPY). This is the app twin of
# check:css / check:tenant — a silent-drift guard (LEARNINGS rule 14).
#
# Kept in its OWN workflow file (not folded into regression.yml, which REG-1 owns)
# so the two gates never clobber each other.

on:
  pull_request:
    paths-ignore: ['docs/**', '*.md']
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']
  workflow_dispatch:

jobs:
  app-strings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The centralization gate: zero user-facing string literals in apps/app
      # components. New literal = failed build; move it into COPY.
      - name: Check app strings are centralized
        run: pnpm check:app-strings

      # PENNY-UX-2 gate: every var(--x) used in apps/app/src must resolve to a
      # definition in tokens.css or an app stylesheet — an unresolved var
      # silently drops radius/background/size (LEARNINGS rule 14).
      - name: Check CSS vars resolve
        run: pnpm check:css-vars

      # Weekly-audit P2 (PR #301): input/select/textarea must never size off
      # --fs-body (floors at 15px) — RESPONSIVE.md rule 6 requires >= 16px on
      # inputs to prevent iOS focus-zoom. Caught the Bills-form regression and
      # its same-day recurrence in new Invoicing-form CSS.
      - name: Check input font-size >= 16px
        run: pnpm check:input-font-size

      # PENNY-UX-9 gate: every authed <h1> must carry .page-title (the restrained
      # authed heading scale). A bare <h1> inherits the public billboard scale
      # (up to 64px) and silently breaks the authed heading ladder (rule 14).
      - name: Check authed headings
        run: pnpm check:authed-headings

      # The copy/config/persona layer's unit tests (catalog integrity, config
      # coercion + fallback, threshold banding).
      - name: App unit tests
        run: pnpm --filter @ff/app test
