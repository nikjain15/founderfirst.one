name: Deployment Log

on:
  push:
    branches: [main]

jobs:
  log-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write deploy log entry
        env:
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${GH_SHA:0:7}"
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          FILES_CHANGED=$(git diff-tree --no-commit-id -r --name-only "$GH_SHA" | head -30 | tr '\n' ',' | sed 's/,$//')

          LOG_FILE="_dev/DEPLOY_LOG.md"

          if [ ! -f "$LOG_FILE" ]; then
            printf '%s\n' \
              "# Deployment Log" \
              "" \
              "Auto-logged on every push to \`main\` → deployed to GitHub Pages at [founderfirst.one](https://founderfirst.one)." \
              "" \
              "| # | Date (UTC) | Commit | Message | Author | Files Changed |" \
              "|---|------------|--------|---------|--------|---------------|" \
              > "$LOG_FILE"
          fi

          ENTRY_NUM=$(grep -c "^| [0-9]" "$LOG_FILE" 2>/dev/null || echo 0)
          ENTRY_NUM=$((ENTRY_NUM + 1))

          printf "| %s | %s | [\`%s\`](https://github.com/%s/commit/%s) | %s | %s | \`%s\` |\n" \
            "$ENTRY_NUM" "$TIMESTAMP" "$SHORT_SHA" "$GH_REPO" "$GH_SHA" \
            "$COMMIT_MSG" "$COMMIT_AUTHOR" "$FILES_CHANGED" \
            >> "$LOG_FILE"

      - name: Commit log update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _dev/DEPLOY_LOG.md
          git diff --cached --quiet || git commit -m "chore: log deploy [skip ci]"
          git push
