        parameters:
        - name: should_escalate
          type: bool
          description: |
            Set to true if this turn should be filed as a ticket for a human to follow up. Escalate when:
            (a) the user's question is outside what the bot can answer from the FounderFirst docs,
            (b) the user asks for a refund, billing change, account change, or anything affecting their data or money,
            (c) the user sounds frustrated,
            (d) the user is asking the same thing twice,
            (e) the bot is not confident,
            (f) the bot's reply explicitly says it will file a ticket / flag the team / get the team to come back / get a human.
            Set to false if the bot fully answered from the docs with no need for human follow-up.
          required: true
        - name: subject
          type: string
          description: A 5-to-10-word summary of what the user needs help with. e.g. "Shopify integration question", "billing question — refund request".
          required: true
        - name: contact_email
          type: string
          description: The user's email address if they mentioned one in this turn or earlier in the conversation. Empty string if no email is known yet.
          required: false
        - name: topic
          type: string
          description: |
            Pick exactly one topic that best describes the ticket. Use lowercase, no quotes. Choose from this fixed vocabulary:
              - billing          (pricing, payments, invoices, refunds, plan changes)
              - bug              (something is broken — errors, wrong output, crashes)
              - integration      (Stripe, QuickBooks, Xero, bank connections, anything 3rd-party)
              - how-to           (usage questions, "how do I…", "where is the X button")
              - feature-request  (wishes, missing capabilities)
              - account          (login, profile, password, account deletion, email change)
              - other            (doesn't fit cleanly into the above)
            If the question doesn't fit any bucket cleanly, return "other". Never invent a new topic name.
          required: false
        instruction: |
          You are classifying a single turn of a FounderFirst support conversation to decide whether a human ticket should be filed.

          The bot just produced this reply to the user:
          ---
          {{#llm.text#}}
          ---

          The user's current message is provided as the query input. Look at both to decide.
