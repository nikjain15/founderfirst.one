# FounderFirst Kokoro TTS — CPU machine, scale-to-zero. No GPU required.
# Deploy: `fly deploy` from this dir. Set the shared secret with
# `fly secrets set KOKORO_SERVER_SECRET=…` (must match the edge function's).
# The edge functions call https://founderfirst-kokoro.fly.dev/synthesize.
app = 'founderfirst-kokoro'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'   # suspend when idle (fast resume) …
  auto_start_machines = true       # … and start on the next request
  min_machines_running = 1         # keep one warm so async /render_item jobs survive
                                   # the 202 response and don't get killed mid-render

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 2
    hard_limit = 4

# CPU machine — Kokoro is light and fast on CPU. Generous RAM for torch + model.
[[vm]]
  size = 'performance-2x'
  memory = '4gb'
