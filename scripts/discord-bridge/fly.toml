# fly.toml app configuration file generated for founderfirst-discord-bridge on 2026-06-21T11:08:42-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'founderfirst-discord-bridge'
primary_region = 'iad'

[build]
  # TypeScript bridge (discord.js). Rollback: change back to 'Dockerfile' (Python) + redeploy.
  dockerfile = 'Dockerfile.node'

[env]
  ADMIN_POLL_INTERVAL_SECONDS = '15'
  WORKER_BASE_URL = 'https://bubble.founderfirst.one'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
