name: App E2E

# Authenticated smoke + responsive + a11y gate for the unified app (apps/app — the
# books/categorize/import surface). The app is built with VITE_E2E=1 + a throwaway
# test account's credentials, so it auto-signs-in with a REAL session
# (apps/app/src/lib/devAuth.ts); we then drive the authed UI headlessly and, for
# every owner surface: screenshot it, sweep the full responsive width ladder
# (no horizontal overflow, 320→1920), and run an axe-core accessibility scan that
# FAILS on any serious/critical WCAG A/AA violation. This is how the app's authed
# screens get verified — render + responsive + a11y — without a human + magic link,
# closing the standing "auth-walled → a11y only static-checked" gap (docs/AUDIT.md).
#
# Required CI config (Settings → Secrets and variables → Actions):
#   secrets.E2E_APP_EMAIL / E2E_APP_PASSWORD — a throwaway Supabase user with an org
#                                              (NOT a real person's account).
#   secrets.VITE_SUPABASE_ANON_KEY, vars.VITE_SUPABASE_URL — same as other workflows.
#
# If the E2E_APP_* secrets are absent the build won't auto-login and the job fails
# loudly at "authed app rendered" — that's the signal to add them, not a silent skip.

on:
  # Docs-only changes (docs/** or root *.md) skip the rebuild — nothing they touch is built.
  pull_request:
    paths-ignore: ['docs/**', '*.md']
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  app-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build app with E2E auto-login
        env:
          VITE_SUPABASE_URL:      ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_E2E:               "1"
          VITE_DEV_APP_EMAIL:     ${{ secrets.E2E_APP_EMAIL }}
          VITE_DEV_APP_PASSWORD:  ${{ secrets.E2E_APP_PASSWORD }}
        run: pnpm --dir apps/app build

      - name: App E2E smoke + responsive + a11y
        run: node tools/app-e2e/run.mjs

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-e2e-screenshots
          path: tools/app-e2e/artifacts/
          if-no-files-found: ignore
