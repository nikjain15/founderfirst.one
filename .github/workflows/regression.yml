# REG-1 · Nightly regression suite.
#
# The permanent, ever-growing scenario pack that back-fills the 15 stress features
# (docs/stress/SCENARIOS.md maps every confirmed P0/P1 finding → its scenario). It
# runs the FULL suite against a FRESH, from-scratch LOCAL stack every night — nothing
# that broke once may silently re-break.
#
# Two layers:
#   1. pgTAP — a from-zero local Supabase (replays ALL migrations + supabase/seed.sql),
#      then `supabase test db`. This also exercises the unique-timestamp / ordering
#      guard by replaying every migration. NEVER runs against prod (LEARNINGS.md rule 4).
#   2. Vitest — apps/app report/status logic scenarios (e.g. RPTTEST 1000-row
#      truncation), pure and DB-free.
#
# On failure the pgTAP TAP output + Vitest report are uploaded as artifacts (the red
# report). Also runnable on demand (workflow_dispatch) and on PRs that touch the
# migrations/tests/report inputs so a regression is caught before merge, not just at night.

name: regression

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC nightly
  workflow_dispatch:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'supabase/seed.sql'
      - 'apps/app/src/ledger/**'
      - '.github/workflows/regression.yml'

jobs:
  pgtap:
    name: pgTAP scenarios (fresh local stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Replays every migration from zero AND applies supabase/seed.sql.
      - name: Start local Supabase (migrations + seed)
        run: supabase db start

      - name: Run pgTAP regression suite
        run: supabase test db 2>&1 | tee regression-pgtap.tap

      - name: Upload red report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-pgtap-report
          path: regression-pgtap.tap
          if-no-files-found: ignore

  vitest:
    name: Vitest scenarios (report/status logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run apps/app Vitest suite
        run: pnpm --dir apps/app test --reporter=verbose 2>&1 | tee regression-vitest.log

      - name: Upload red report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-vitest-report
          path: regression-vitest.log
          if-no-files-found: ignore
