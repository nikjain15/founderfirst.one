<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>FounderFirst Signals — Options</title>
  <style>
    body { font: 14px/1.5 -apple-system, Segoe UI, Helvetica, Arial, sans-serif; color: #0a0a0a; background: #f6f6f4; margin: 0; padding: 24px; }
    .card { max-width: 480px; margin: 0 auto; background: #fff; border: 1px solid #e8e8e5; border-radius: 12px; padding: 24px; }
    h1 { font-size: 18px; margin: 0 0 4px; }
    p.sub { margin: 0 0 20px; color: #5a5a5a; font-size: 13px; }
    label { display: block; font-weight: 600; font-size: 13px; margin: 16px 0 6px; }
    input { width: 100%; box-sizing: border-box; min-height: 40px; padding: 8px 10px; font-size: 14px; border: 1px solid #d4d4d0; border-radius: 8px; }
    button { margin-top: 20px; min-height: 40px; padding: 8px 18px; font-size: 14px; font-weight: 600; color: #fff; background: #0a0a0a; border: none; border-radius: 999px; cursor: pointer; }
    .status { margin-top: 12px; font-size: 13px; min-height: 18px; }
    .ok { color: #1a7f37; } .err { color: #b3261e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>FounderFirst Signals</h1>
    <p class="sub">Configure where captured posts are sent. Ask the team for the intake secret.</p>

    <label for="endpoint">Intake endpoint</label>
    <input id="endpoint" type="url" placeholder="https://…supabase.co/functions/v1/listening-intake" />

    <label for="secret">Intake secret</label>
    <input id="secret" type="password" placeholder="shared secret" />

    <button id="save">Save</button>
    <div class="status" id="status"></div>
  </div>
  <script src="config.js"></script>
  <script src="options.js"></script>
</body>
</html>
