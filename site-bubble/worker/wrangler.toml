name = "penny-site-bubble"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — Cloudflare auto-creates the DNS record + provisions the SSL
# cert in the founderfirst.one zone on deploy. The zone must be on this
# Cloudflare account first (it is — migrated 27 Apr 2026).
[[routes]]
pattern = "bubble.founderfirst.one"
custom_domain = true

# KV namespace for site-content cache (15-min TTL).
# Create once: `wrangler kv:namespace create SITE_CACHE`
# Then paste the id below.
[[kv_namespaces]]
binding = "SITE_CACHE"
id = "0ae05a489e5e435e80256b637bdc607e"

# Workers AI — powers /compose (email "Draft with AI"), replacing the local
# Ollama compose-server on the Mac. Free-tier daily allocation.
[ai]
binding = "AI"

# Secrets (set via `wrangler secret put NAME`):
#   ANTHROPIC_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   COMPOSE_SECRET        (shared with the email-compose Supabase fn)

[vars]
ALLOWED_ORIGINS = "https://founderfirst.one,https://www.founderfirst.one,http://localhost:4000,http://127.0.0.1:4000"
ANTHROPIC_MODEL = "claude-haiku-4-5-20251001"
SITE_URL = "https://founderfirst.one"

# Cloudflare AI Gateway (AI quality & cost layer, D11). Leave UNSET to call
# providers directly (the Phase-0 default — byte-identical to today). To route
# every AI call through the gateway (routing, fallback, spend caps, logs):
#   1. Create a gateway in the Cloudflare dashboard (AI → AI Gateway), cache OFF.
#   2. Uncomment + fill these, then `wrangler deploy`.
# resolve() reads both; with either missing it falls back to direct calls.
# AI_GATEWAY_ACCOUNT_ID = "<cloudflare-account-id>"
# AI_GATEWAY_ID = "<gateway-id>"
