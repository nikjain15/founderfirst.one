name: signals-worker secret-compare

# Weekly audit (2026-07-06, PR #301) flagged tools/signals-worker/compose-server.mjs
# as comparing the shared x-compose-secret header with a plain `!==`, which leaks
# the secret's correct-prefix length through response timing. Fixed via a
# constant-time compare in timingSafeSecret.mjs; this workflow proves it in CI.
# Uses Node's built-in test runner — no new dependency.

on:
  pull_request:
    paths:
      - 'tools/signals-worker/timingSafeSecret.mjs'
      - 'tools/signals-worker/timingSafeSecret.test.mjs'
      - 'tools/signals-worker/compose-server.mjs'
      - '.github/workflows/signals-worker-secret-compare.yml'
  push:
    branches: [main]
    paths:
      - 'tools/signals-worker/timingSafeSecret.mjs'
      - 'tools/signals-worker/timingSafeSecret.test.mjs'
      - 'tools/signals-worker/compose-server.mjs'
  workflow_dispatch:

jobs:
  timing-safe-secret:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compose-server syntax check
        run: node --check tools/signals-worker/compose-server.mjs

      - name: Timing-safe secret compare tests
        run: node --test tools/signals-worker/timingSafeSecret.test.mjs
