title: "FounderFirst"
description: "The operating software for solopreneurs and business owners. Starting with Penny — an AI bookkeeper that keeps your finances clean so you can focus on the work only you can do."
url: "https://founderfirst.one"
author: "Nik Jain"

markdown: kramdown
highlighter: rouge

include:
  - assets
  - DESIGN_SYSTEM.md

exclude:
  - _dev
  - tools
  - BookKeeping
  - CLAUDE.md
  - ANALYTICS.md
  - README.md
  - "FounderFirst OS"
  - .claude
  - node_modules
  - "**/*.sh"
  # Phase 0+ workspace — not built by Jekyll. The Vite/VitePress build
  # produces a separate dist/ that gets deployed in Phase 4.
  - apps
  - packages
  - scripts
  - vendor
  - pnpm-workspace.yaml
  - package.json
  - pnpm-lock.yaml
  - tsconfig.json

collections:
  posts:
    output: true
    permalink: /blog/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Nik Jain"
